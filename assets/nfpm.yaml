name: qdeck
arch: ${ARCH}
platform: linux
version: ${VERSION}
maintainer: bosiakov
description: qdeck - Helm Values Editor
homepage: https://github.com/qdeck-app/qdeck
license: MIT

overrides:
  deb:
    depends:
      - libwayland-client0
      - libx11-6
      - libxkbcommon-x11-0
      - libgles2
      - libegl1
      - libxcursor1
      - libvulkan1
  rpm:
    depends:
      - libwayland-client
      - libX11
      - libxkbcommon-x11
      - mesa-libGLESv2
      - mesa-libEGL
      - libXcursor
      - vulkan-loader
  archlinux:
    depends:
      - wayland
      - libx11
      - libxkbcommon-x11
      - mesa
      - libxcursor
      - vulkan-icd-loader

contents:
  - src: ./dist/linux/qdeck
    dst: /usr/bin/qdeck
    file_info:
      mode: 0755

  - src: ./assets/desktop-assets/qdeck.desktop
    dst: /usr/share/applications/qdeck.desktop
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-16.png
    dst: /usr/share/icons/hicolor/16x16/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-24.png
    dst: /usr/share/icons/hicolor/24x24/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-32.png
    dst: /usr/share/icons/hicolor/32x32/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-48.png
    dst: /usr/share/icons/hicolor/48x48/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-64.png
    dst: /usr/share/icons/hicolor/64x64/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-128.png
    dst: /usr/share/icons/hicolor/128x128/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-256.png
    dst: /usr/share/icons/hicolor/256x256/apps/qdeck.png
    file_info:
      mode: 0644

  - src: ./assets/linux-icons/qdeck-512.png
    dst: /usr/share/icons/hicolor/512x512/apps/qdeck.png
    file_info:
      mode: 0644
