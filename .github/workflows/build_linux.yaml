name: Build Linux

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Update dependencies
        run: sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt install gcc pkg-config \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libffi-dev \
            libxcursor-dev \
            libvulkan-dev

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.0

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Update Version in qdeck.desktop
        run: |
          VERSION=${{ github.event.release.tag_name }}
          sed -i "s/^Version=.*/Version=${VERSION#v}/" assets/desktop-assets/qdeck.desktop

      - name: Build linux ${{ matrix.arch }} tarball
        run: make build_linux LINUX_ARCH=${{ matrix.arch }} TAG_NAME=${{ github.ref_name }}

      - name: Build deb package
        run: make build_deb LINUX_ARCH=${{ matrix.arch }} TAG_NAME=${{ github.ref_name }}

      - name: Build rpm package
        run: make build_rpm LINUX_ARCH=${{ matrix.arch }} TAG_NAME=${{ github.ref_name }}

      - name: Build Arch Linux package
        run: make build_archlinux LINUX_ARCH=${{ matrix.arch }} TAG_NAME=${{ github.ref_name }}

      - name: Clean up build artifacts
        run: make clean_linux

      - name: Upload Release Assets
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            ./dist/qdeck-${{ github.ref_name }}-${{ matrix.arch }}.tar.xz \
            ./dist/qdeck-${{ github.ref_name }}-${{ matrix.arch }}.deb \
            ./dist/qdeck-${{ github.ref_name }}-${{ matrix.arch }}.rpm \
            ./dist/qdeck-${{ github.ref_name }}-${{ matrix.arch }}.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
